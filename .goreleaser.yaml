version: 2

project_name: kubeconfig-manager

before:
  hooks:
    - go mod tidy

builds:
  - id: kcm
    main: ./cmd/kubeconfig-manager
    binary: kcm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/loupeznik/kubeconfig-manager/internal/cli.Version={{ .Version }}
      - -X github.com/loupeznik/kubeconfig-manager/internal/cli.Commit={{ .Commit }}
      - -X github.com/loupeznik/kubeconfig-manager/internal/cli.Date={{ .Date }}

archives:
  - id: kcm
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - README.md
      - docs/**/*

dockers_v2:
  - id: kcm
    ids:
      - kcm
    dockerfile: Dockerfile.goreleaser
    images:
      - ghcr.io/loupeznik/kubeconfig-manager
    tags:
      - "{{ .Version }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.source: https://github.com/loupeznik/kubeconfig-manager
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: TUI + CLI for managing kubeconfig files and kubectl contexts
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .Commit }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.licenses: Apache-2.0
    extra_files:
      - LICENSE
      - NOTICE

docker_signs:
  - cmd: cosign
    artifacts: all
    args:
      - sign
      - --yes
      - "${artifact}@${digest}"

homebrew_casks:
  - name: kcm
    ids:
      - kcm
    binaries: [kcm]
    directory: Casks
    repository:
      owner: Loupeznik
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/Loupeznik/kubeconfig-manager"
    description: "TUI + CLI for managing kubeconfig files and kubectl contexts"
    license: "Apache-2.0"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    # Strip macOS Gatekeeper quarantine xattr on the unsigned binary so
    # Gatekeeper doesn't refuse to run it on the user's Mac after download.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kcm"]
          end
    manpages:
      - docs/man/*.1
    skip_upload: auto

snapcrafts:
  - id: kcm
    ids:
      - kcm
    name: kubeconfig-manager
    title: kubeconfig-manager
    summary: TUI + CLI for managing kubeconfig files and kubectl contexts
    description: |
      kcm (kubeconfig-manager) is a TUI + CLI for managing local kubeconfig
      files with tagging, destructive-action guards for kubectl and helm,
      and shell integration (bash, zsh, fish, pwsh).
    # v0.x is preview; anything v1+ is stable. snap store rejects `devel`
    # grade from the `stable` channel, which matches prerelease semantics.
    grade: '{{ if eq .Major 0 }}devel{{ else }}stable{{ end }}'
    confinement: classic
    license: Apache-2.0
    publish: true
    apps:
      kcm:
        command: kcm
        aliases: [kcm, kubeconfig-manager]

aurs:
  - name: kubeconfig-manager-bin
    ids:
      - kcm
    homepage: "https://github.com/Loupeznik/kubeconfig-manager"
    description: "TUI + CLI for managing kubeconfig files and kubectl contexts"
    maintainers:
      - 'Dominik Zarsky <dzarsky@dzarsky.eu>'
    license: "Apache-2.0"
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/kubeconfig-manager-bin.git"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    package: |-
      install -Dm755 "./kcm" "${pkgdir}/usr/bin/kcm"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"
      install -Dm644 "./NOTICE" "${pkgdir}/usr/share/licenses/${pkgname}/NOTICE"
      for mf in ./docs/man/*.1; do
        install -Dm644 "$mf" "${pkgdir}/usr/share/man/man1/$(basename "$mf")"
      done
      mkdir -p "${pkgdir}/usr/share/bash-completion/completions"
      "./kcm" completion bash > "${pkgdir}/usr/share/bash-completion/completions/kcm"
      mkdir -p "${pkgdir}/usr/share/zsh/site-functions"
      "./kcm" completion zsh  > "${pkgdir}/usr/share/zsh/site-functions/_kcm"
      mkdir -p "${pkgdir}/usr/share/fish/vendor_completions.d"
      "./kcm" completion fish > "${pkgdir}/usr/share/fish/vendor_completions.d/kcm.fish"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
