version: 2

project_name: kubeconfig-manager

before:
  hooks:
    - go mod tidy

builds:
  - id: kcm
    main: ./cmd/kubeconfig-manager
    binary: kcm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/loupeznik/kubeconfig-manager/internal/cli.Version={{ .Version }}
      - -X github.com/loupeznik/kubeconfig-manager/internal/cli.Commit={{ .Commit }}
      - -X github.com/loupeznik/kubeconfig-manager/internal/cli.Date={{ .Date }}

archives:
  - id: kcm
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - README.md
      - docs/**/*

dockers:
  - id: kcm-amd64
    image_templates:
      - "ghcr.io/loupeznik/kubeconfig-manager:{{ .Version }}-amd64"
      - "ghcr.io/loupeznik/kubeconfig-manager:latest-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/loupeznik/kubeconfig-manager"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=TUI + CLI for managing kubeconfig files and kubectl contexts"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=MIT"
    extra_files:
      - LICENSE
      - NOTICE

  - id: kcm-arm64
    image_templates:
      - "ghcr.io/loupeznik/kubeconfig-manager:{{ .Version }}-arm64"
      - "ghcr.io/loupeznik/kubeconfig-manager:latest-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/loupeznik/kubeconfig-manager"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=TUI + CLI for managing kubeconfig files and kubectl contexts"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=MIT"
    extra_files:
      - LICENSE
      - NOTICE

docker_manifests:
  - name_template: "ghcr.io/loupeznik/kubeconfig-manager:{{ .Version }}"
    image_templates:
      - "ghcr.io/loupeznik/kubeconfig-manager:{{ .Version }}-amd64"
      - "ghcr.io/loupeznik/kubeconfig-manager:{{ .Version }}-arm64"
  - name_template: "ghcr.io/loupeznik/kubeconfig-manager:latest"
    image_templates:
      - "ghcr.io/loupeznik/kubeconfig-manager:latest-amd64"
      - "ghcr.io/loupeznik/kubeconfig-manager:latest-arm64"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
