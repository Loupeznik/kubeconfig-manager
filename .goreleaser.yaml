version: 2

project_name: kubeconfig-manager

before:
  hooks:
    - go mod tidy

builds:
  - id: kcm
    main: ./cmd/kubeconfig-manager
    binary: kcm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/loupeznik/kubeconfig-manager/internal/cli.Version={{ .Version }}
      - -X github.com/loupeznik/kubeconfig-manager/internal/cli.Commit={{ .Commit }}
      - -X github.com/loupeznik/kubeconfig-manager/internal/cli.Date={{ .Date }}

archives:
  - id: kcm
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - README.md
      - docs/**/*

dockers_v2:
  - id: kcm
    ids:
      - kcm
    dockerfile: Dockerfile.goreleaser
    images:
      - ghcr.io/loupeznik/kubeconfig-manager
    tags:
      - "{{ .Version }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.source: https://github.com/loupeznik/kubeconfig-manager
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: TUI + CLI for managing kubeconfig files and kubectl contexts
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .Commit }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.licenses: MIT
    extra_files:
      - LICENSE
      - NOTICE

docker_signs:
  - cmd: cosign
    artifacts: all
    args:
      - sign
      - --yes
      - "${artifact}@${digest}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
