name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
