site_name: kubeconfig-manager
site_description: CLI + TUI for managing local kubeconfig files and kubectl contexts
site_url: https://loupeznik.github.io/kubeconfig-manager/
repo_url: https://github.com/loupeznik/kubeconfig-manager
repo_name: loupeznik/kubeconfig-manager
edit_uri: edit/master/docs/
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

nav:
  - Home: README.md
  - Guides:
      - Getting started: getting-started.md
      - Shell integration: shell-integration.md
      - Tags and alerts: tags-and-alerts.md
      - Destructive-action guard: guard.md
      - Import, split, merge: import-split-merge.md
      - State file: state-file.md
      - Architecture: architecture.md
      - Roadmap: roadmap.md
  - CLI reference:
      - kcm: cli/kcm.md
      - list: cli/kcm_list.md
      - show: cli/kcm_show.md
      - contexts: cli/kcm_contexts.md
      - use: cli/kcm_use.md
      - tui: cli/kcm_tui.md
      - tag: cli/kcm_tag.md
      - tag add: cli/kcm_tag_add.md
      - tag remove: cli/kcm_tag_remove.md
      - tag list: cli/kcm_tag_list.md
      - alert: cli/kcm_alert.md
      - alert enable: cli/kcm_alert_enable.md
      - alert disable: cli/kcm_alert_disable.md
      - alert show: cli/kcm_alert_show.md
      - rename: cli/kcm_rename.md
      - import: cli/kcm_import.md
      - split: cli/kcm_split.md
      - merge: cli/kcm_merge.md
      - kubectl: cli/kcm_kubectl.md
      - install-shell-hook: cli/kcm_install-shell-hook.md
      - uninstall-shell-hook: cli/kcm_uninstall-shell-hook.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/loupeznik/kubeconfig-manager

copyright: Copyright &copy; 2026 Dominik Zarsky
